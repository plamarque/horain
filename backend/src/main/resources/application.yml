server:
  port: 8080

# API key for frontend auth. Reads HORAIN_API_KEY from .env or env; falls back to HORAIN_DEV_KEY.
horain:
  api-key: ${HORAIN_API_KEY:HORAIN_DEV_KEY}
  dev:
    seed-enabled: true  # Enable POST /dev/seed for local dev; set false in postgres profile

# LLM integration. Reads LLM_API_KEY or OPENAI_API_KEY from .env; enables assistant when set.
llm:
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:${OPENAI_API_KEY:}}
  model: ${LLM_MODEL:gpt-4o-mini}

# Load .env from backend/ directory when running locally (optional; Render injects env vars directly).
spring:
  config:
    import: optional:file:.env[.properties]
  flyway:
    locations: classpath:db/migration/{vendor}
  datasource:
    url: jdbc:h2:mem:horain;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    database-platform: org.hibernate.dialect.H2Dialect

---
# PostgreSQL profile for deployment (e.g. Render + Supabase)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/horain
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

horain:
  api-key: ${HORAIN_API_KEY:HORAIN_DEV_KEY}
  dev:
    seed-enabled: false  # Disable dev seed in production

# LLM integration (optional). OPENAI_API_KEY or LLM_API_KEY enables assistant.
# LLM_BASE_URL, LLM_MODEL override defaults when set.
llm:
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:${OPENAI_API_KEY:}}
  model: ${LLM_MODEL:gpt-4o-mini}
